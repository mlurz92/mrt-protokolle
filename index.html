<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>myExam Cockpit Explorer · Prisma Fit</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="assets/css/myexam-cockpit.css" />
<script defer src="data/protocol-database.js"></script>
<script defer src="assets/js/app.js"></script>
</head>
<body>
<div class="app">

  <!-- Fenstertitel -->
  <header class="window-title">
    <div class="wt-left">myExam Cockpit - Explorer</div>
    <div class="window-controls">
      <span title="Hilfe" aria-label="Hilfe"><svg class="icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><use href="#icon-help"/></svg></span>
      <span title="Maximieren" aria-label="Maximieren"><svg class="icon" viewBox="0 0 16 16" width="12" height="12" aria-hidden="true"><use href="#icon-maximize"/></svg></span>
      <span title="Schließen" aria-label="Schließen"><svg class="icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true"><use href="#icon-close"/></svg></span>
    </div>
  </header>

  <!-- Ribbon -->
  <section class="ribbon">
    <div class="ribbon-group">
      <div class="ribbon-title">Explorer</div>
      <div class="ribbon-tabs">
        <span class="active">Browse</span>
        <span>Importieren</span>
        <span>Export</span>
      </div>
    </div>
    <div class="ribbon-group">
      <div class="ribbon-title">Programm Editor</div>
      <div class="ribbon-tabs r2">
        <span class="active">Bearbeiten</span>
        <span>Simulieren</span>
      </div>
    </div>
  </section>

  <!-- Toolbar -->
  <section class="toolbar">
    <div class="tool-left">
      <span class="ico is-disabled" aria-disabled="true" tabindex="-1" title="Neu nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="9" height="12" rx="1"/><polyline points="8,1 8,5 12,5"/><path d="M8 1l4 4"/></svg>
      </span>
      <span class="ico is-disabled" aria-disabled="true" tabindex="-1" title="Importieren nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><line x1="8" y1="5" x2="8" y2="11"/><polyline points="5,9 8,12 11,9"/></svg>
      </span>
      <span class="ico-sep"></span>
      <span class="ico is-disabled" aria-disabled="true" tabindex="-1" title="Löschen nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3,4 13,4"/><path d="M5 4v9h6V4"/><polyline points="6,4 6,2 10,2 10,4"/></svg>
      </span>
      <span class="ico is-disabled" aria-disabled="true" tabindex="-1" title="Kopieren nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="9" height="10" rx="1"/><path d="M3 11V2h9"/></svg>
      </span>
      <span class="ico is-disabled" aria-disabled="true" tabindex="-1" title="Einfügen nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="10" height="11" rx="1"/><path d="M5 4V2h7v2"/><line x1="5" y1="8" x2="9" y2="8"/><line x1="5" y1="10" x2="9" y2="10"/></svg>
      </span>
      <span class="ico-sep"></span>
      <span class="ico is-disabled" id="btnUndo" aria-disabled="true" tabindex="-1" title="Rückgängig nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8 C3 5 6 3 9 3 C12 3 14 5 14 8 C14 11 12 13 9 13"/><polyline points="3,5 3,8 6,8"/></svg>
      </span>
      <span class="ico is-disabled" id="btnRedo" aria-disabled="true" tabindex="-1" title="Wiederholen nicht verfügbar (Read-only)">
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 8 C13 5 10 3 7 3 C4 3 2 5 2 8 C2 11 4 13 7 13"/><polyline points="13,5 13,8 10,8"/></svg>
      </span>
    </div>
    <div class="toolbar-fill"></div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut" title="Verkleinern (Strg+−)">
        <svg viewBox="0 0 18 18" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <circle cx="7.5" cy="7.5" r="5.2"/>
          <line x1="5.2" y1="7.5" x2="9.8" y2="7.5"/>
          <line x1="11.5" y1="11.5" x2="15.5" y2="15.5"/>
        </svg>
      </button>
      <button class="zoom-level" id="zoomLevel" title="Zoom zurücksetzen (Strg+0)" aria-label="Zoomstufe, klicken zum Zurücksetzen">100%</button>
      <button class="zoom-btn" id="zoomIn" title="Vergrößern (Strg++)">
        <svg viewBox="0 0 18 18" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <circle cx="7.5" cy="7.5" r="5.2"/>
          <line x1="7.5" y1="5.2" x2="7.5" y2="9.8"/>
          <line x1="5.2" y1="7.5" x2="9.8" y2="7.5"/>
          <line x1="11.5" y1="11.5" x2="15.5" y2="15.5"/>
        </svg>
      </button>
    </div>
  </section>

  <!-- Main: Sidebar + Workspace -->
  <main class="main">
    <aside class="sidebar">
      <div class="fleet-row">
        <div class="fleet-select">FLEET <span><svg class="icon" viewBox="0 0 16 16" width="9" height="9" aria-hidden="true"><use href="#icon-chevron-down"/></svg></span></div>
        <div class="lock" title="Gesperrt">
          <svg viewBox="0 0 14 16" width="12" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="10" height="8" rx="1"/><path d="M4 7V5a3 3 0 016 0v2"/></svg>
        </div>
      </div>
      <div class="search-row">
        <button id="collapseAll" class="collapse-all" title="Alle einklappen" aria-label="Alle einklappen"></button>
        <div class="search-box">
          <span class="search-loupe" aria-hidden="true"></span>
          <input id="search" placeholder="Suche" title="Geben Sie einen Suchbegriff ein" aria-label="Geben Sie einen Suchbegriff ein" autocomplete="off" spellcheck="false" role="combobox" aria-expanded="false" aria-controls="searchHistory" aria-autocomplete="list" />
          <button id="clear" class="search-clear" title="Suche löschen" aria-label="Suche löschen">
            <svg class="icon" viewBox="0 0 16 16" width="10" height="10" aria-hidden="true"><use href="#icon-close"/></svg>
          </button>
          <div id="searchHistory" class="search-history" role="listbox" aria-label="Suchverlauf" hidden></div>
        </div>
      </div>
      <div id="tree" class="tree" role="tree" aria-label="Protokollbaum"></div>
    </aside>

    <section class="workspace" id="workspace">
      <div id="program" class="program-wrap"></div>
    </section>
  </main>

  <!-- Statusleiste -->
  <footer class="status" id="status" role="status" aria-live="polite"></footer>

</div>

<!-- Icon-Sprite: zentrale SVG-Symbole für alle einfachen UI-Icons (Konsistenz statt Textglyphen) -->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true" focusable="false">
  <defs>
    <symbol id="icon-close" viewBox="0 0 16 16"><line x1="3" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="13" y1="3" x2="3" y2="13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></symbol>
    <symbol id="icon-help" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.2" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M6.1 6.2c0-1.1.9-1.9 1.9-1.9s1.9.7 1.9 1.7c0 1.4-1.9 1.3-1.9 3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="8" cy="11.4" r="0.9" fill="currentColor"/></symbol>
    <symbol id="icon-maximize" viewBox="0 0 16 16"><rect x="2.5" y="2.5" width="11" height="11" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.4"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 16 16"><path d="M2.5 13.5l0.6-2.8 7.7-7.7c0.5-0.5 1.3-0.5 1.8 0l0.9 0.9c0.5 0.5 0.5 1.3 0 1.8l-7.7 7.7z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="9.7" y1="4.1" x2="11.9" y2="6.3" stroke="currentColor" stroke-width="1.3"/></symbol>
    <symbol id="icon-check" viewBox="0 0 16 16"><path d="M3 8.3l3.3 3.3 6.4-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 16 16"><path d="M6 3.5l5 4.5-5 4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 16 16"><path d="M3.5 6l4.5 5 4.5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-play" viewBox="0 0 16 16"><path d="M4.5 3l8 5-8 5z" fill="currentColor"/></symbol>
    <symbol id="icon-history" viewBox="0 0 16 16"><path d="M8 3.2a4.8 4.8 0 1 1-4.6 3.4" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M3 3v3.4h3.4" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 5.4v2.8l2 1.4" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 16 16"><path d="M3.5 4.5h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M5.2 4.5V3.3c0-.4.3-.7.7-.7h4c.4 0 .7.3.7.7v1.2" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M4.4 4.5l0.5 8.1c0 .5.5 1 1 1h4.2c.5 0 1-.5 1-1l0.5-8.1" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></symbol>
  </defs>
</svg>
</body>
</html>
